name: CI

# Runs the same checks the local pre-push hook runs (.husky/pre-push), so a push
# that passed locally is green here too. Determinism: pinned Node (.nvmrc), pinned
# action SHAs, and `npm ci` from the committed lockfile (no resolution drift).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so only the latest commit's CI matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the default token is read-only; widen per-job only when needed.
permissions:
  contents: read

defaults:
  run:
    working-directory: ./website

jobs:
  ci:
    name: typecheck · format · unit · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install (clean, lockfile-pinned)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  # ── Dormant lanes — add when the code they test exists ───────────────────────
  # integration: needs the PostgreSQL data layer (epic e02). Add a job with a
  #   services: postgres:16 container + DATABASE_URL and `npm run test:integration`.
  # e2e: needs public pages / admin (epics e04–e05). Add a Playwright job.
  # Adding them before there is anything to test would just make CI red — which is
  # exactly what we are avoiding. Wire each in the epic that introduces its tests.

# Runnable task plan for story e01s01 — Initialize Astro 5+ project with i18n
# Decoupled from epic.yaml so verify commands stay runnable as-is.
# npm is the _bsm_wrap shell function here; call the absolute binary. All scripts run from website/.
story_id: e01s01
title: "Initialize Astro 5+ project with i18n"
bcps: 1
npm: &npm /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm
gate: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run typecheck && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run build)"

# Each step leaves the tree working and has ONE observable outcome verified by ONE command.
steps:
  - id: 1
    do: "Add @astrojs/node standalone adapter dep (astro add node --yes, or npm i)."
    verify: "grep -q '@astrojs/node' website/package.json"

  - id: 2
    do: "Add React 19 islands: @astrojs/react + react@19 + react-dom@19 (astro add react --yes)."
    verify: 'grep -q ''@astrojs/react'' website/package.json && grep -q ''"react"'' website/package.json'

  - id: 3
    do: "Add Tailwind v4: @tailwindcss/vite + tailwindcss@4."
    verify: "grep -q '@tailwindcss/vite' website/package.json"

  - id: 4
    do: >
      Write website/astro.config.mjs: output:'server'; adapter node({mode:'standalone'});
      integrations [react()]; vite.plugins [tailwindcss()];
      i18n { defaultLocale:'en', locales:['en','pt-br'], routing:{ prefixDefaultLocale:false } }.
    # Project Prettier style is singleQuote:true — config uses single quotes.
    verify: 'grep -q "output: ''server''" website/astro.config.mjs && grep -q ''prefixDefaultLocale: false'' website/astro.config.mjs && grep -q "defaultLocale: ''en''" website/astro.config.mjs'

  - id: 5
    do: "Port locale.ts verbatim (locale-agnostic) to website/src/lib/locale.ts."
    verify: "grep -q 'normalizeLocaleTag' website/src/lib/locale.ts && grep -q 'localeTagsMatch' website/src/lib/locale.ts"

  - id: 6
    do: >
      Port article-locales.ts to website/src/lib/article-locales.ts per Decision 1
      (English-first ordering; keep getArticleLocaleLabels).
    verify: "grep -q 'ARTICLE_LOCALES' website/src/lib/article-locales.ts && grep -q 'getArticleLocaleLabels' website/src/lib/article-locales.ts"

  - id: 7
    do: >
      Create NET-NEW website/src/lib/categories.ts with English keys/slugs per Decision 2
      (news, interviews, analysis, brazilian-research — pending user confirm).
    verify: "grep -q 'news' website/src/lib/categories.ts && grep -q 'brazilian-research' website/src/lib/categories.ts"

  - id: 8
    do: "Make website/tsconfig.json strict (extend astro/tsconfigs/strict)."
    verify: "grep -q 'strict' website/tsconfig.json"

  - id: 9
    do: 'Create website/src/styles/main.css importing Tailwind v4 (@import "tailwindcss";).'
    verify: "test -f website/src/styles/main.css && grep -q 'tailwindcss' website/src/styles/main.css"

  - id: 10
    do: "Port upstream locale tests to website/src/lib/__tests__/locale.test.ts (red-green in develop-tdd)."
    verify: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit)"

  - id: 11
    do: "Final gate: typecheck + SSR build produce dist/ with no type errors."
    verify: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run typecheck && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run build) && test -d website/dist"

open_decisions:
  - "Decision 1: article-locales — port all 6 English-first (recommended) vs trim to [en,pt-br]."
  - "Decision 2: categories.ts v1 key set — confirm news/interviews/analysis/brazilian-research."

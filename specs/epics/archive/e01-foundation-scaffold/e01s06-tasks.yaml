# Runnable task plan for story e01s06 — Foundational observability & input-validation primitives
# Decoupled from epic.yaml so verify commands stay runnable as-is.
# npm is the _bsm_wrap shell function here; call the absolute binary. All scripts run from website/.
story_id: e01s06
title: "Foundational observability & input-validation primitives (ADR-018, ADR-015)"
bcps: 1
npm: &npm /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm
gate: >
  (cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit --
  src/lib/__tests__/logger.test.ts src/lib/__tests__/validation.test.ts)

# ADR-0018: structured JSON logging + request-id + secret redaction land in e01 so every
#   later module instruments from line one. No console.* (CONVENTIONS.md line 31).
# ADR-0015: every /api/* route parses input through a zod schema, returns 400 on invalid.
# Each step leaves the tree working and has ONE observable outcome verified by ONE command.
steps:
  - id: 1
    do: >
      Install zod as a runtime dependency (npm i zod). Foundational for validation.ts.
    verify: 'grep -q ''"zod"'' website/package.json'

  - id: 2
    do: >
      RED: write website/src/lib/__tests__/logger.test.ts covering — (a) info() emits one
      JSON line with level/msg/timestamp; (b) redaction: cookie, authorization, password,
      DATABASE_URL values replaced with [REDACTED]; (c) LOG_LEVEL=warn suppresses info/debug.
      Capture output via a spy on process.stdout.write.
    verify: "test -f website/src/lib/__tests__/logger.test.ts"

  - id: 3
    do: >
      GREEN: write website/src/lib/logger.ts — JSON-line logger with debug/info/warn/error,
      LOG_LEVEL env gate (default 'info'), and a redaction allowlist of sensitive keys
      (cookie, authorization, set-cookie, password, token, secret, database_url) applied
      recursively to merged context. Writes via process.stdout.write (the ONE allowed sink).
    verify: "grep -q 'redact' website/src/lib/logger.ts && grep -qi 'LOG_LEVEL' website/src/lib/logger.ts"

  - id: 4
    do: >
      RED: write website/src/lib/__tests__/validation.test.ts covering — (a) valid body parses
      to a typed object; (b) invalid body throws/returns a 400 with a safe generic message
      (no zod internals, no field values leaked); (c) the route helper returns a Response
      with status 400 on failure.
    verify: "test -f website/src/lib/__tests__/validation.test.ts"

  - id: 5
    do: >
      GREEN: write website/src/lib/validation.ts — export validate(schema, input) returning the
      parsed value or throwing a ValidationError; and validateRequest/route helper that returns
      a 400 Response with a generic '{ error: \"Invalid request\" }' body on failure. Logs the
      rejection via logger (no input echoed).
    verify: "grep -q 'zod' website/src/lib/validation.ts && grep -q 'validate' website/src/lib/validation.ts"

  - id: 6
    do: >
      Wire website/src/middleware/index.ts (Astro onRequest) — assign a request id from the
      inbound x-request-id header or crypto.randomUUID(), stash it on context.locals, set it on
      the response header, and log request completion (method, route/pathname, status, latency-ms)
      via logger after next().
    verify: "grep -qE 'requestId|x-request-id' website/src/middleware/index.ts && grep -q 'onRequest' website/src/middleware/index.ts"

  - id: 7
    do: >
      Confirm CONVENTIONS.md carries both rules (no console.*; every API route validates via a
      zod schema). Already present at lines 31-32 from e01s03 — verify, add only if missing.
    verify: "grep -q 'validate' CONVENTIONS.md && grep -qi 'console' CONVENTIONS.md"

  - id: 8
    do: >
      Story gate: logger + validation unit tests pass (redaction, level filtering, 400-on-invalid,
      typed-pass). Then full preflight (typecheck + format:check + build) stays green.
    verify: >
      (cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit --
      src/lib/__tests__/logger.test.ts src/lib/__tests__/validation.test.ts)

open_decisions: []

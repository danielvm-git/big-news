# Runnable task plan for story e02s01 — Storage adapter interface (the test seam)
# Decoupled from epic.yaml so verify commands stay runnable as-is.
# npm is the _bsm_wrap shell function here; call the absolute binary. All scripts run from website/.
story_id: e02s01
title: "Storage adapter interface (the test seam)"
bcps: 1
npm: &npm /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm
gate: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run typecheck && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit)"

# Each step leaves the tree working and has ONE observable outcome verified by ONE command.
# Zero new dependencies (pure TS interfaces + mock). Adapter seam = ADR-0004.
steps:
  - id: 1
    do: >
      Create website/src/lib/adapter/types.ts with English-canonical domain types (no Appwrite $id):
      ArticleData, TranslationData, UserData, SettingsData, SessionData.
    verify: "grep -q 'interface ArticleData' website/src/lib/adapter/types.ts && grep -q 'interface SettingsData' website/src/lib/adapter/types.ts"

  - id: 2
    do: >
      In types.ts define sub-adapter interfaces — ArticleAdapter (createArticle, getArticle,
      updateArticle, deleteArticle, listArticles, getArticleBySlug, getPublishedArticles,
      getFeaturedArticles, getArticlesByCategory, searchArticles + createTranslation, getTranslations,
      updateTranslation, deleteTranslation), AuthAdapter (createUser, authenticateUser, createSession,
      validateSession, destroySession, getUser), FileStorageAdapter (uploadFile, getFileUrl, deleteFile),
      SettingsAdapter (getSettings, updateSettings) — and compose them into StorageAdapter.
    verify: "grep -q 'interface StorageAdapter' website/src/lib/adapter/types.ts && grep -q 'searchArticles' website/src/lib/adapter/types.ts && grep -q 'validateSession' website/src/lib/adapter/types.ts"

  - id: 3
    do: >
      Make website/src/lib/adapter/index.ts re-export the contract (export * from './types.js') so
      StorageAdapter stays importable from '../index.js' (preserves the existing mock import).
    verify: 'grep -q "from ''./types" website/src/lib/adapter/index.ts'

  - id: 4
    do: >
      Expand website/src/lib/adapter/__tests__/mock-adapter.ts: in-memory MockAdapter implements
      StorageAdapter (Maps for articles/translations/users/sessions/settings/files).
    verify: "grep -q 'createArticle' website/src/lib/adapter/__tests__/mock-adapter.ts && grep -q 'implements StorageAdapter' website/src/lib/adapter/__tests__/mock-adapter.ts"

  - id: 5
    do: >
      Add contract test website/src/lib/adapter/__tests__/types.test.ts asserting a MockAdapter
      instance exposes every required method (typeof === 'function') across all four sub-adapters.
    verify: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit -- types)"

  - id: 6
    do: "Final gate: MockAdapter type-checks against StorageAdapter and the unit suite is green."
    verify: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run typecheck && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit)"

# Runnable task plan for story e02s06 — S3-compatible storage adapter (ADR-0006)
# Decoupled from epic.yaml so verify commands stay runnable as-is.
# npm is the _bsm_wrap shell function here; call the absolute binary. All scripts run from website/.
story_id: e02s06
title: "S3-compatible storage adapter (ADR-0006)"
bcps: 1
npm: &npm /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm
gate: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit -- storage-adapter)"

# Implements FileStorageAdapter (e02s01). S3 default via @aws-sdk/client-s3 [OK]; local FS dev fallback.
# Local-driver path is unit-testable with a temp dir (no DB/network). S3 path verified against MinIO
# in compose is OPTIONAL and out of the per-step verify (keeps CI hermetic).
steps:
  - id: 1
    do: "Install @aws-sdk/client-s3 (cd website && npm i @aws-sdk/client-s3)."
    verify: "grep -q '@aws-sdk/client-s3' website/package.json"

  - id: 2
    do: >
      Create website/src/lib/adapter/postgres/storage-adapter.ts implementing FileStorageAdapter with
      the S3 driver as default (uploadFile via PutObjectCommand, getFileUrl returns the public URL,
      deleteFile via DeleteObjectCommand) reading S3_* env.
    verify: "grep -q 'uploadFile' website/src/lib/adapter/postgres/storage-adapter.ts && grep -q 'S3' website/src/lib/adapter/postgres/storage-adapter.ts"

  - id: 3
    do: >
      Add a local FS driver selected by STORAGE_DRIVER=local: writes under ./uploads and serves via
      /uploads (dev-only fallback per ADR-0006).
    verify: "grep -q 'STORAGE_DRIVER' website/src/lib/adapter/postgres/storage-adapter.ts && grep -q 'uploads' website/src/lib/adapter/postgres/storage-adapter.ts"

  - id: 4
    do: "Add MIME allowlist (image/*) + max-size validation; reject non-image / oversized uploads."
    verify: "grep -q 'image/' website/src/lib/adapter/postgres/storage-adapter.ts"

  - id: 5
    do: >
      Add website/src/lib/adapter/postgres/__tests__/storage-adapter.test.ts (unit, local driver via a
      temp dir): valid image upload→getFileUrl→delete round-trips; non-image and oversized uploads are
      rejected.
    verify: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit -- storage-adapter)"

  - id: 6
    do: "Final gate: typecheck clean; storage-adapter unit suite green."
    verify: "(cd website && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run typecheck && /Users/danielvm/.nvm/versions/node/v24.15.0/bin/npm run test:unit -- storage-adapter)"
